steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/sovereign-diagnostic', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sovereign-diagnostic']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sovereign-oracle-stock-analysis'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sovereign-diagnostic'
      - '--region'
      - 'us-west2'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY