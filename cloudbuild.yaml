steps:
  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/sovereign-diagnostic', '.']

  # Step 2: Push the image to the registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/sovereign-diagnostic']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'sovereign-oracle-stock-analysis'
      - '--image'
      - 'gcr.io/$PROJECT_ID/sovereign-diagnostic'
      - '--region'
      - 'us-west2'
      - '--allow-unauthenticated'

# THE FIX: This satisfies the "invalid argument" requirement
options:
  logging: CLOUD_LOGGING_ONLY